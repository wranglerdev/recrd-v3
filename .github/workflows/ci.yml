name: CI

on:
  push:
    branches: [main]
  pull_request:

# Static analysis + tests with the 100% coverage gate (PRD §25). A build is only
# valid if lint, type-check, tests and bundling all pass.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Unit + integration tests (coverage gate 100%)
        run: npm run test:coverage

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build main/preload (esbuild)
        run: npm run build:main

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright/Electron system libraries
        run: npx playwright install-deps

      - name: Rebuild native modules for Electron ABI (better-sqlite3)
        # better-sqlite3 from `npm ci` is built for Node's ABI; Electron needs its
        # own (ABI 132). Without this the main process throws on createDatabase and
        # every E2E test times out. We fetch the matching prebuilt explicitly —
        # `electron-builder install-app-deps` reports success but leaves the
        # Node-ABI binary in place. See issue electron-9ac.
        run: |
          EV=$(node -p "require('electron/package.json').version")
          cd node_modules/better-sqlite3
          npx prebuild-install --runtime electron --target "$EV" --arch x64

      - name: Run Electron E2E (headless via xvfb)
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  windows-package:
    # Build the distributable Windows binaries from CI (PRD §26): NSIS installer
    # (.exe) + portable (.exe), x64. Runs after the quality gate on pushes to
    # main (skipped on PRs to keep them fast). Tagged official releases with
    # traceable metadata are handled by release.yml.
    runs-on: windows-latest
    needs: quality
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build main/preload (esbuild)
        run: npm run build:main

      - name: Package Windows installer + portable (electron-builder)
        run: npx electron-builder --win --x64 --publish never
        env:
          # No signing certificate in CI; skip auto-discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify both artifacts were produced
        shell: pwsh
        run: |
          $exes = Get-ChildItem release -Filter *.exe -ErrorAction SilentlyContinue
          $names = $exes.Name -join ', '
          Write-Host "Artifacts: $names"
          if (-not ($exes.Name -match 'setup')) { throw "NSIS installer (.exe) not found" }
          if (-not ($exes.Name -match 'portable')) { throw "Portable (.exe) not found" }

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: recrd-windows-x64
          path: release/*.exe
          if-no-files-found: error
