name: CI

on:
  push:
    branches: [main]
  pull_request:

# Static analysis + tests with the 100% coverage gate (PRD §25). A build is only
# valid if lint, type-check, tests and bundling all pass.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Unit + integration tests (coverage gate 100%)
        run: npm run test:coverage

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build main/preload (esbuild)
        run: npm run build:main

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
